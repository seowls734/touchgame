<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚔️ 방치의 던전 — IDLE DUNGEON</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0c0e16; --panel:#161a28; --panel2:#1d2236; --line:#2c3350;
    --gold:#ffce54; --gem:#7ee0ff; --dps:#ff7b6b; --click:#9b8cff;
    --txt:#e8ecf5; --dim:#8b93ad; --good:#5ad17a; --bad:#ff5a78;
  }
  html,body{height:100%}
  body{
    background:radial-gradient(circle at 50% -10%,#1a2140,#0c0e16 60%);
    color:var(--txt);font-family:'Segoe UI','Malgun Gothic',sans-serif;
    overflow:hidden;user-select:none;
  }
  #app{display:flex;flex-direction:column;height:100vh;max-width:1100px;margin:0 auto}

  /* ── 상단 자원 바 ── */
  #topbar{display:flex;gap:8px;padding:10px;flex-wrap:wrap;justify-content:center;
    background:linear-gradient(#11141f,#0c0e16);border-bottom:1px solid var(--line)}
  .res{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;align-items:center}
  .res .v{font-size:18px;font-weight:700;line-height:1.1}
  .res .k{font-size:10px;letter-spacing:1px;color:var(--dim);margin-top:2px}
  .res.gold .v{color:var(--gold)} .res.gem .v{color:var(--gem)}
  .res.dps .v{color:var(--dps)} .res.click .v{color:var(--click)}

  /* ── 본문 ── */
  #main{flex:1;display:flex;gap:10px;padding:10px;min-height:0}
  #combat{flex:1.1;display:flex;flex-direction:column;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden}
  #shop{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    display:flex;flex-direction:column;min-width:0}

  /* 스테이지 헤더 */
  #stageHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  #stageNav{display:flex;align-items:center;gap:6px}
  .navbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;width:30px;height:28px;font-size:15px;cursor:pointer}
  .navbtn:active{transform:scale(.92)}
  #stageLabel{font-size:15px;font-weight:700}
  #lockBtn{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--dim);cursor:pointer}
  #lockBtn.on{color:#0c0e16;background:var(--gold);border-color:var(--gold);font-weight:700}

  /* 몬스터 무대 */
  #stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;cursor:pointer;min-height:200px;
    touch-action:manipulation;-webkit-user-select:none;user-select:none}
  #mob{font-size:120px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.6));
    transition:transform .05s;line-height:1}
  #mob.hit{transform:scale(.9) rotate(-4deg)}
  #mobName{margin-top:6px;font-size:13px;color:var(--dim);letter-spacing:1px}
  #bossTimer{font-size:14px;font-weight:700;color:var(--bad);height:18px;margin-top:2px}
  /* HP 바 */
  #hpWrap{width:90%;max-width:380px;height:24px;background:#0a0c14;border:1px solid var(--line);
    border-radius:20px;overflow:hidden;margin-top:14px;position:relative}
  #hpBar{height:100%;width:100%;background:linear-gradient(90deg,#ff6a5a,#ff3b6b);
    transition:width .08s linear}
  #hpTxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;text-shadow:0 1px 3px #000}
  #killCount{font-size:11px;color:var(--dim);margin-top:8px;height:14px}

  /* 떠오르는 데미지 숫자 */
  .float{position:absolute;font-weight:800;pointer-events:none;animation:floatUp .9s ease-out forwards;
    text-shadow:0 2px 4px #000;font-size:20px;z-index:5}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.8)}
    20%{transform:translateY(-10px) scale(1.15)}100%{opacity:0;transform:translateY(-70px) scale(1)}}

  /* ── 이벤트 배너 ── */
  #eventBar{display:none;margin:0 10px 4px;padding:8px 12px;border-radius:10px;
    align-items:center;gap:10px;font-size:13px;font-weight:700;
    border:1px solid var(--gold);
    background:linear-gradient(90deg,rgba(255,206,84,.18),rgba(255,206,84,.04));
    animation:evPop .3s ease-out}
  #eventBar.show{display:flex}
  #eventBar.choice{border-color:var(--gem);
    background:linear-gradient(90deg,rgba(126,224,255,.18),rgba(126,224,255,.04))}
  @keyframes evPop{0%{opacity:0;transform:translateY(-8px)}100%{opacity:1;transform:translateY(0)}}
  #eventBar .ev-ico{font-size:26px;line-height:1}
  #eventBar .ev-txt{flex:1;min-width:0}
  #eventBar .ev-sub{font-size:11px;color:var(--dim);font-weight:400;margin-top:1px}
  #eventBar .ev-time{font-size:12px;color:var(--gold);white-space:nowrap}
  #eventBar.choice .ev-time{color:var(--gem)}
  #eventBar .ev-join{background:var(--gem);color:#0c0e16;border:none;
    padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap}
  #eventBar .ev-join:active{transform:scale(.95)}

  /* ── 콤보 표시 ── */
  #combo{position:absolute;top:6px;right:10px;text-align:right;z-index:7;
    opacity:0;transition:opacity .2s;pointer-events:none}
  #combo.on{opacity:1}
  #combo .cv{font-size:22px;font-weight:800;color:var(--gold);text-shadow:0 2px 6px #000;line-height:1}
  #combo .cb{font-size:11px;color:var(--dps);font-weight:700}
  #combo.hot .cv{color:var(--dps);animation:comboPunch .12s ease-out}
  @keyframes comboPunch{0%{transform:scale(1.4)}100%{transform:scale(1)}}

  /* ── 행운의 상자 ── */
  .chest{position:absolute;font-size:40px;cursor:pointer;z-index:8;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));animation:chestIn .3s ease-out, chestBob 1s ease-in-out .3s infinite}
  .chest:active{transform:scale(.85)}
  @keyframes chestIn{0%{opacity:0;transform:scale(0) rotate(-30deg)}100%{opacity:1;transform:scale(1)}}
  @keyframes chestBob{50%{transform:translateY(-8px) rotate(4deg)}}

  /* ── 액티브 스킬 바 ── */
  #skillBar{display:flex;gap:6px;margin-top:10px}
  .skillBtn{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:6px 4px;cursor:pointer;color:var(--dim);text-align:center;transition:.1s}
  .skillBtn .si{font-size:22px;line-height:1}
  .skillBtn .sn{font-size:10px;font-weight:700;margin-top:2px}
  .skillBtn .sc{font-size:9px;color:var(--dim);margin-top:1px}
  .skillBtn.ready{color:var(--txt);border-color:#3a4a6e}
  .skillBtn.ready .sc{color:var(--good)}
  .skillBtn.ready:hover{border-color:var(--gold)}
  .skillBtn.active{border-color:var(--gold);background:rgba(255,206,84,.12);color:var(--gold)}
  .skillBtn.active .sc{color:var(--gold)}
  .skillBtn:active{transform:scale(.95)}

  /* ── 상점 ── */
  #shopTabs{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .tab{flex:1 1 auto;padding:7px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--dim);
    cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active{color:var(--txt);border-bottom-color:var(--gold)}
  #shopList{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  #shopList::-webkit-scrollbar{width:8px}
  #shopList::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
  .card:active{transform:scale(.99)}
  .card.afford{border-color:#3a4a6e}
  .card.afford:hover{border-color:var(--gold)}
  .card.locked{opacity:.45;cursor:not-allowed}
  .card .ico{font-size:30px;width:42px;text-align:center;flex:none}
  .card .info{flex:1;min-width:0}
  .card .nm{font-size:14px;font-weight:700}
  .card .sub{font-size:11px;color:var(--dim);margin-top:2px}
  .card .lvl{font-size:11px;color:var(--gem);margin-top:2px}
  .card .cost{font-size:13px;font-weight:700;text-align:right;flex:none;white-space:nowrap}
  .card .cost.ok{color:var(--gold)} .card .cost.no{color:var(--bad)}
  .card .cost.gem.ok{color:var(--gem)}

  /* ── 하단 ── */
  #footer{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);align-items:center}
  #saveStat{font-size:11px;color:var(--dim);flex:1}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:9px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
  .btn:active{transform:scale(.96)}
  #prestigeBtn{border-color:#5b4bb0;color:#c9bcff}
  #prestigeBtn.ready{background:linear-gradient(90deg,#7a5cff,#b46bff);color:#fff;border:none;
    box-shadow:0 0 16px rgba(140,90,255,.5);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{box-shadow:0 0 26px rgba(140,90,255,.85)}}

  /* ── 모달 ── */
  #modalBg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  #modalBg.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:24px;max-width:380px;width:100%;text-align:center}
  #modal h2{font-size:20px;margin-bottom:10px}
  #modal p{color:var(--dim);font-size:13px;line-height:1.6;margin-bottom:18px}
  #modal .big{font-size:22px;font-weight:800;color:var(--gold)}
  #modalBtns{display:flex;gap:10px}
  #modalBtns .btn{flex:1;padding:12px}

  @media(max-width:680px){
    /* 모바일: 바깥(#main) 스크롤을 없애 전투 영역 탭이 스크롤로 새지 않게 한다.
       전투 영역은 고정 높이로 항상 보이고, 스크롤은 상점 목록(#shopList) 내부에서만 발생 */
    /* 상단 자원 바: 4개를 한 줄로 압축(기존 2줄 → 1줄)해 세로 공간 확보 */
    #topbar{padding:6px;gap:5px}
    .res{flex:1 1 0;min-width:0;padding:5px 3px;border-radius:8px}
    .res .v{font-size:13px}
    .res .k{font-size:8px;letter-spacing:.3px;margin-top:1px}
    #main{flex-direction:column;overflow:hidden;gap:7px;padding:7px}
    #combat{flex:none;height:39vh;min-height:215px;padding:9px}
    #shop{flex:1;min-height:155px}
    #stage{min-height:0}
    #mob{font-size:80px}
    #mobName{font-size:11px;margin-top:3px}
    #hpWrap{margin-top:7px;height:20px}
    #killCount{margin-top:3px}
    #skillBar{margin-top:6px}
    .skillBtn .si{font-size:19px}
    /* 이펙트도 작아진 몹 크기에 맞춰 비례 축소(PC와 같은 비율 유지) */
    .float{font-size:15px}
    #combo .cv{font-size:17px}
    #combo .cb{font-size:10px}
    #bossTimer{font-size:12px;height:15px}
    .chest{font-size:32px}
    /* 상점 카드 압축: 한 화면에 더 많은 항목이 보이도록 */
    #shopList{padding:6px;gap:6px}
    .card{padding:7px 9px;gap:8px;border-radius:9px}
    .card .ico{font-size:24px;width:32px}
    .card .nm{font-size:13px}
    .card .sub{font-size:10px;margin-top:1px}
    .card .lvl{font-size:10px;margin-top:1px}
    .card .cost{font-size:12px}
    .tab{padding:6px 3px;font-size:11px}
    #footer{padding:6px 8px;gap:6px}
    .btn{padding:7px 9px;font-size:11px}
    #saveStat{font-size:10px}
  }
  /* 모바일에서 PC와 동일한 윈도우 이모지를 쓰기 위해 Segoe UI Emoji를

// ── 숫자 포맷 ──
const SUF=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','Ud','Dd',
  'Td','Qad','Qid','Sxd','Spd','Ocd','Nod','Vg','Uvg','Dvg','Tvg','Qavg','Qivg','Sxvg','Spvg','Ocvg','Novg',
  'Tg','Utg','Dtg','Ttg','Qatg','Qitg','Sxtg','Sptg','Octg','Notg','Qag'];
function fmt(n){
  if(n<1000)return (Math.floor(n*10)/10).toString().replace(/\.0$/,'');
  let t=0; while(n>=1000&&t<SUF.length-1){n/=1000;t++;}
  return n.toFixed(n<10?2:n<100?1:0)+SUF[t];
}
function fmtTime(s){
  s=Math.floor(s); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;
  if(h>0)return `${h}시간 ${m}분`; if(m>0)return `${m}분 ${x}초`; return `${x}초`;
}

// ── 유물 효과 합산 ──
function relicFx(){
  const r={click:1,dps:1,gold:1,crit:0,bossTime:0,gem:0,offline:0};
  for(const rc of RELICS){
    const lv=(S.relics&&S.relics[rc.id])||0; if(lv<=0)continue;
    const v=rc.per*lv;
    switch(rc.type){
      case 'click':   r.click*=1+v; break;
      case 'dps':     r.dps*=1+v;   break;
      case 'gold':    r.gold*=1+v;  break;
      case 'allDmg':  r.click*=1+v; r.dps*=1+v; break;
      case 'crit':    r.crit+=v;    break;
      case 'bossTime':r.bossTime+=v;break;
      case 'gem':     r.gem+=v;     break;
      case 'offline': r.offline+=v; break;
    }
  }
  return r;
}
// ── 대장간 장비 효과 ──
function equipFx(){
  const fx={click:1,allDmg:1,gold:1};
  if(S.equip)for(const sl of EQUIP_SLOTS){
    const e=S.equip[sl.id]; if(!e||!e.lv||e.lv<=0)continue;
    const v=sl.per*e.lv*RARITIES[e.rar||0].mult;
    if(sl.stat==='click')fx.click*=1+v;
    else if(sl.stat==='allDmg')fx.allDmg*=1+v;
    else if(sl.stat==='gold')fx.gold*=1+v;
  }
  return fx;
}
function equipStatVal(sl){ const e=S.equip&&S.equip[sl.id]; if(!e||!e.lv)return 0; return sl.per*e.lv*RARITIES[e.rar||0].mult; }
// ── 연구소 효과(완료된 연구의 영구 보너스 합산) ──
function researchFx(){
  const fx={gold:1,dps:1,click:1,allDmg:1,crit:0,offline:0,gem:0};
  const done=S.research&&S.research.done; if(!done)return fx;
  for(const r of RESEARCH){ if(!done[r.id])continue;
    switch(r.type){
      case 'gold':   fx.gold*=1+r.val; break;
      case 'dps':    fx.dps*=1+r.val;  break;
      case 'click':  fx.click*=1+r.val;break;
      case 'allDmg': fx.click*=1+r.val; fx.dps*=1+r.val; break;
      case 'crit':   fx.crit+=r.val;   break;
      case 'offline':fx.offline+=r.val;break;
      case 'gemFind':fx.gem+=r.val;    break;
    }
  }
  return fx;
}
// 순수 스테이지 골드 기준값(각종 배수 제외) — 대장간/뽑기 비용 산정용
function pureGold(st){ return 6*Math.pow(1.24,Math.max(0,st-1)); }

// 액티브 스킬 버프 배율
function skillDmgMult(){ return (skillState.berserk&&skillState.berserk.buff>0)?3:1; }
function skillGoldMult(){ return (skillState.gold&&skillState.gold.buff>0)?3:1; }
// 이벤트 버프(동시에 최대 1개 활성)
function evBuff(type){ return (curEvent&&!curEvent.pending&&curEvent.def.type===type)?curEvent.def.value:null; }
function eventDmgMult(){ return evBuff('dmg')||1; }
function eventGoldMult(){ return evBuff('gold')||1; }
function eventCritAdd(){ return evBuff('crit')||0; }
function eventGemAdd(){ return evBuff('gem')||0; }
function eventAutoAdd(){ return evBuff('auto')||0; }

// ── 파생 수치 ──
function clickPower(){
  const eq=equipFx(), rs=researchFx();
  return Math.ceil(1*Math.pow(1.6,S.upg.click))*gemAllMult()*heroFx().click*relicFx().click
    *eq.click*eq.allDmg*rs.click*rs.allDmg*skillDmgMult()*eventDmgMult();
}
function totalDps(){
  let d=0;
  for(const h of HEROES) d+=(S.heroes[h.id]||0)*h.dps;
  d*=Math.pow(1.25,S.upg.dmg);   // 동료 훈련
  d*=gemAllMult();
  d*=heroFx().dps;               // 동료 특수 능력
  d*=relicFx().dps;              // 유물
  d*=equipFx().allDmg;           // 대장간 장비(갑옷)
  { const rs=researchFx(); d*=rs.dps*rs.allDmg; } // 연구소
  d*=skillDmgMult();             // 광폭화
  d*=eventDmgMult();             // 이벤트 버프
  return d;
}
function goldMult(){ return Math.pow(1.20,S.upg.gold)*Math.pow(1.30,S.gem.gGold||0)*relicFx().gold*equipFx().gold*researchFx().gold*skillGoldMult()*eventGoldMult(); }
// 자동 공격 횟수/초 (자동 검술 + 영혼 분신 + 이벤트 분신)
function autoRate(){ return (S.upg.auto||0)+(S.gem.gAuto||0)+eventAutoAdd(); }
// 치명타 확률/배율 (강화·정수·유물·동료 합산)
function critChance(){ return Math.min(0.95, CRIT_CHANCE+heroFx().crit+relicFx().crit+researchFx().crit+0.02*(S.upg.crit||0)+0.03*(S.gem.gCrit||0)+eventCritAdd()); }
function critMult(){ return CRIT_MULT+heroFx().critDmg+0.30*(S.upg.critDmg||0); }
// 보스 제한시간 보너스 (동료+유물)
function bossTimeBonus(){ return heroFx().bossTime+relicFx().bossTime; }
// 오프라인 효율 (기본 0.6 + 강화/정수/유물)
function offlineEff(){ return Math.min(2.0, 0.6+0.10*(S.upg.offline||0)+0.15*(S.gem.gOffline||0)+relicFx().offline+researchFx().offline); }
// 정수 드롭 추가 확률 (동료+유물)
function gemFindChance(){ return Math.min(0.95, heroFx().gem+relicFx().gem+researchFx().gem+eventGemAdd()); }
function gemAllMult(){ return 1+0.25*(S.gem.gALL||0); }

// 동료 특수 능력 합산 → 각종 보정치
function heroFx(){
  const fx={click:1,dps:1,gold:1,crit:0,critDmg:0,bossDmg:1,bossTime:0,gem:0};
  for(const h of HEROES){
    const c=S.heroes[h.id]||0; if(c<=0)continue;
    const p=HERO_PERKS[h.id]; if(!p)continue;
    const v=p.per*perkSteps(c,p.every);
    switch(p.type){
      case 'click':   fx.click*=1+v; break;
      case 'dps':     fx.dps*=1+v;   break;
      case 'gold':    fx.gold*=1+v;  break;
      case 'allDmg':  fx.click*=1+v; fx.dps*=1+v; break;
      case 'crit':    fx.crit+=v;    break;
      case 'critDmg': fx.critDmg+=v; break;
      case 'bossDmg': fx.bossDmg*=1+v; break;
      case 'bossTime':fx.bossTime+=v;  break;
      case 'gemFind': fx.gem+=v;     break;
    }
  }
  fx.crit=Math.min(fx.crit,0.6);   // 치명타 확률 상한
  fx.gem=Math.min(fx.gem,0.75);    // 정수 획득 확률 상한
  return fx;
}

// 직전 보스 스테이지(없으면 0)
function prevBossStage(stage){ return Math.floor(stage/10)*10; }
function mobMaxHp(stage,boss){
  let hp=10*Math.pow(1.55,stage-1);
  if(boss)hp*=10;
  else if(!isBossStage(stage)){
    // 보스를 잡은 뒤 나오는 모든 애드는 직전 보스보다 단단하고, 진행할수록 더 강해진다
    const pb=prevBossStage(stage);
    if(pb>=10){
      const floor=10*Math.pow(1.55,pb-1)*10*1.1*Math.pow(1.55,stage-pb-1);
      hp=Math.max(hp,floor);
    }
  }
  return Math.ceil(hp);
}
function goldReward(stage,boss){
  let g=6*Math.pow(1.24,stage-1);   // 스테이지가 오를수록 골드 급증
  if(boss)g*=35;                    // 보스는 훨씬 더 많이
  else if(!isBossStage(stage)){
    // 보스를 잡은 뒤 나오는 모든 애드는 직전 보스보다 짭짤하고, 진행할수록 더 많이 준다
    const pb=prevBossStage(stage);
    if(pb>=10){
      const floor=6*Math.pow(1.24,pb-1)*35*1.6*Math.pow(1.24,stage-pb-1);
      g=Math.max(g,floor);
    }
  }
  return Math.ceil(g*goldMult()*heroFx().gold);
}
function isBossStage(st){return st%10===0;}
function killsNeeded(st){return isBossStage(st)?1:4;} // 일반 스테이지는 4킬마다 전진

// ── 환생(프레스티지) 보상 ──
// 환생할 때마다 다음 환생에 필요한 최소 스테이지가 10씩 올라간다.
function prestigeReqStage(){ return 12+4*(S.prestiges||0); }
function gemsFromPrestige(){
  if(S.maxStage<prestigeReqStage())return 0;
  return Math.floor(Math.pow(S.maxStage/10,1.7));
}

// ── 몬스터 스폰 ──
// phase: 'normal'=일반 몬스터, 'boss'=보스, 'fled'=보스 도주 후 부하
let mob={hp:0,max:0,boss:false,timer:0,phase:'normal'};
let bossReturn=0;                 // 보스 도주 후 재등장까지 남은 시간(초). 0이면 비활성
const BOSS_FLEE_RETURN=14;        // 도주 후 재등장 대기(초)
function spawnMob(force){
  // force: 'boss' | 'minion' | undefined(스테이지 기본값)
  const st=S.stage, bossStage=isBossStage(st);
  let boss;
  if(force==='boss')boss=true;
  else if(force==='minion')boss=false;
  else boss=bossStage;
  if(force!=='minion')bossReturn=0;
  mob.boss=boss;
  mob.phase=boss?'boss':(bossStage?'fled':'normal');
  mob.max=mobMaxHp(st,boss); mob.hp=mob.max;
  mob.timer=boss?(30+bossTimeBonus()):0;     // 기사+수호의 방패: 보스 제한시간 연장
  const idx=(st-1);
  if(boss){
    $('mob').textContent=BOSSES[(st/10-1)%BOSSES.length];
    $('mobName').textContent='👑 '+BOSS_NAMES[(st/10-1)%BOSS_NAMES.length];
  }else if(mob.phase==='fled'){
    $('mob').textContent=MOBS[(idx+st)%MOBS.length];
    $('mobName').textContent='⚔️ '+MOB_NAMES[(idx+st)%MOB_NAMES.length]+' (보스의 부하)';
  }else{
    $('mob').textContent=MOBS[idx%MOBS.length];
    $('mobName').textContent=MOB_NAMES[idx%MOB_NAMES.length];
  }
  renderHp();
}
function renderHp(){
  const pct=Math.max(0,mob.hp/mob.max*100);
  $('hpBar').style.width=pct+'%';
  $('hpTxt').textContent=fmt(Math.max(0,mob.hp))+' / '+fmt(mob.max);
  if(mob.phase==='boss')$('bossTimer').textContent='⏳ 도주까지 '+Math.max(0,mob.timer).toFixed(1)+'초';
  else if(bossReturn>0)$('bossTimer').textContent='👑 보스 재등장까지 '+Math.max(0,bossReturn).toFixed(1)+'초';
  else $('bossTimer').textContent='';
  const need=killsNeeded(S.stage);
  if(mob.phase==='boss')$('killCount').textContent='보스를 처치하라!';
  else if(mob.phase==='fled')$('killCount').textContent='💨 보스 도주! 부하를 처치하면 더 빨리 돌아온다';
  else $('killCount').textContent=`이 스테이지 처치 ${S.killsThisStage}/${need}`;
}

// ── 데미지 적용 / 처치 ──
function dealDamage(amt,fromClick,crit){
  if(mob.hp<=0)return;
  if(mob.boss)amt*=heroFx().bossDmg;          // 용기사: 보스 추가 피해
  mob.hp-=amt;
  if(fromClick)floatNum(amt,!!crit,crit?'#ff5a78':'#ffd86b');
  if(mob.hp<=0)onKill();
  else renderHp();
}
function onKill(){
  // 보스 도주 중 부하 처치: 스테이지 전진 없이 골드만, 보스 재등장 시간 단축
  if(mob.phase==='fled'){
    S.gold+=goldReward(S.stage,false);
    S.totalKills++;
    bossReturn=Math.max(0,bossReturn-2);
    floatNum('보스 재등장 -2초',false,'#7ee0ff');
    spawnMob('minion');
    updateTop();
    return;
  }
  const boss=mob.boss;
  if(boss){
    // 보스 첫 처치(이번 회차) 시 정수 드롭
    if(!S.bossCleared)S.bossCleared={};
    if(!S.bossCleared[S.stage]){
      S.bossCleared[S.stage]=true;
      const bg=Math.max(1,Math.floor(S.stage/10));
      S.gems+=bg; floatNum('💎 +'+bg,true,'#7ee0ff');
      // 보스 처치 보너스 골드(특히 더!)
      const bonus=goldReward(S.stage,true)*5;
      S.gold+=bonus; floatNum('💰 보스 보너스 +'+fmt(bonus),false,'#ffce54');
      // 유물 드롭(첫 처치 한정)
      if(Math.random()<RELIC_DROP_CHANCE){
        const rc=RELICS[Math.floor(Math.random()*RELICS.length)];
        if(!S.relics)S.relics={}; S.relics[rc.id]=(S.relics[rc.id]||0)+1;
        floatNum(rc.ico+' '+rc.nm+' Lv.'+S.relics[rc.id]+'!',true,'#ffd86b');
      }
    }
    // 대천사+정수의 원석: 추가 정수 확률
    const gf=gemFindChance();
    if(gf>0&&Math.random()<gf){ S.gems+=1; floatNum('💎 +1',true,'#7ee0ff'); }
  }
  S.gold+=goldReward(S.stage,boss);
  S.totalKills++; S.killsThisStage++;
  const need=killsNeeded(S.stage);
  let advanced=false;
  if(S.killsThisStage>=need){
    S.killsThisStage=0;
    if(S.autoProgress){
      S.stage++; advanced=true;
      S.maxStage=Math.max(S.maxStage,S.stage);
      S.frontier=Math.max(S.frontier,S.stage);
      S.bestStage=Math.max(S.bestStage||1,S.maxStage);
    }
  }
  if(advanced)floatNum('스테이지 '+S.stage+'!',false,'#ffce54');
  spawnMob();
  updateTop(); updateStageLabel();
}

// ── 떠오르는 숫자 ──
function floatNum(v,crit,color){
  const el=document.createElement('div');
  el.className='float';
  el.textContent=typeof v==='number'?('-'+fmt(v)):v;
  el.style.color=color||(crit?'#fff':'#ffd86b');

let lastTick=Date.now();

function tick(){
  const now=Date.now(); let dt=(now-lastTick)/1000; lastTick=now;
  if(dt>1)dt=1;
  // 액티브 스킬 쿨다운/버프 진행
  for(const id in skillState){ const st=skillState[id];
    if(st.cd>0)st.cd=Math.max(0,st.cd-dt);

  if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ combo=0; renderCombo(); } }

    mob.timer-=dt;
    if(mob.timer<=0){ floatNum('보스 도주!',false,'#ff5a78'); S.killsThisStage=0; spawnMob(); }
  }
  // 동료 DPS + 자동 검술(클릭 피해 × 자동공격 횟수)
  const d=totalDps()+autoRate()*clickPower();
  if(d>0&&mob.hp>0){
    dealDamage(d*dt,false);
    // 동료가 공격하고 있다는 걸 보여주기 위한 시각 피드백
    dpsAccum+=d*dt; dpsTimer+=dt;

}

let buyMode=1;
const BUY_MODES=[1,10,100,'max'];
$('buyMaxBtn').onclick=()=>{
  buyMode=BUY_MODES[(BUY_MODES.indexOf(buyMode)+1)%BUY_MODES.length];
  $('buyMaxBtn').textContent='구매: '+(buyMode==='max'?'MAX':'x'+buyMode);

function costFor(base,mult,have,qty){
  let c=0,b=base*Math.pow(mult,have);
  for(let i=0;i<qty;i++){c+=b;b*=mult;}
  return c;
}
function maxAfford(base,mult,have,gold){
  let n=0,b=base*Math.pow(mult,have),sum=0;
  while(sum+b<=gold&&n<100000){sum+=b;b*=mult;n++;}
  return {n,sum};
}
function resolveQty(base,mult,have,currency){
  if(buyMode!=='max')return {n:buyMode,sum:costFor(base,mult,have,buyMode)};
  const r=maxAfford(base,mult,have,currency);
  return r.n<1?{n:1,sum:costFor(base,mult,have,1)}:r;
}

function expRunningCount(){ let n=0; for(const d of EXPEDITIONS) if(expStatus(d)!=='idle')n++; return n; }

const FORGE_GROWTH=1.05;   // 강화할 때마다 가격이 5%씩만 아주 완만하게 증가
function forgeCraftCost(){ return Math.ceil(pureGold(Math.max(1,S.maxStage))*55+40); }
// 현재 레벨에서의 1회 강화 비용 기준값(등급이 높을수록 살짝 비쌈)
function forgeUpBase(sl){
  const e=(S.equip&&S.equip[sl.id])||{lv:0,rar:0};
  return forgeCraftCost()*(0.06+0.06*RARITIES[e.rar||0].mult);
}
// 현재 구매 수량 모드(1/10/100/max)에 맞춘 강화 레벨 수·총비용
function forgeUpInfo(sl){
  const e=(S.equip&&S.equip[sl.id])||{lv:0,rar:0};
  return resolveQty(forgeUpBase(sl), FORGE_GROWTH, e.lv, S.gold);
}
const REFORGE_COST=6;  // 재련 1회 정수 비용
function rollRarity(){
  let t=0; for(const w of RARITY_WEIGHT)t+=w;
  let x=Math.random()*t;
  for(let i=0;i<RARITY_WEIGHT.length;i++){ if(x<RARITY_WEIGHT[i])return i; x-=RARITY_WEIGHT[i]; }
  return 0;
}
function craftEquip(sl){
  if(!S.equip)S.equip={};
  const cur=S.equip[sl.id]; if(cur&&cur.lv>0)return;
  const cost=forgeCraftCost(); if(S.gold<cost)return;
  S.gold-=cost; const rar=rollRarity();
  S.equip[sl.id]={lv:1,rar};
  floatNum('🔨 '+RARITIES[rar].nm+' '+sl.nm+' 제작!',true,RARITIES[rar].col);
  updateTop();renderShop();flashSave();
}
function upgradeEquip(sl){
  const e=S.equip&&S.equip[sl.id]; if(!e||e.lv<=0)return;
  const {n,sum}=forgeUpInfo(sl); if(n<1||S.gold<sum)return;
  S.gold-=sum; e.lv+=n;
  updateTop();renderShop();flashSave();
}
function reforgeEquip(sl){
  const e=S.equip&&S.equip[sl.id]; if(!e||e.lv<=0)return;
  if(S.gems<REFORGE_COST)return;
  S.gems-=REFORGE_COST; const nr=rollRarity();
  if(nr>(e.rar||0)){ e.rar=nr; floatNum('✨ '+RARITIES[nr].nm+'(으)로 승급!',true,RARITIES[nr].col); }
  else floatNum('재련 실패 — 등급 유지',false,'#8b93ad');
  updateTop();renderShop();flashSave();
}

// ── 뽑기 / 룰렛 ──
let lastGacha={gold:'',gem:''};
const ROULETTE_GROWTH=1.015;   // 한 번 돌릴 때마다 가격이 1.5%씩만 계속 증가
function rouletteBase(){ return pureGold(Math.max(1,S.maxStage))*130+100; }
// 현재 누적 횟수 + 구매 수량 모드에 맞춘 횟수·총비용
function rouletteInfo(){ return resolveQty(rouletteBase(), ROULETTE_GROWTH, S.rouletteSpins||0, S.gold); }
function spinGoldRoulette(){
  const {n,sum}=rouletteInfo(); if(n<1||S.gold<sum)return;
  S.gold-=sum; S.rouletteSpins=(S.rouletteSpins||0)+n;
  const avg=sum/n; let addGold=0,addGem=0,buff=0,jack=0;
  for(let i=0;i<n;i++){
    const r=Math.random();
    if(r<0.45) addGold+=avg*0.3;            // 꽝(본전 손해)
    else if(r<0.75) addGold+=avg*1.5;       // 소폭 이득
    else if(r<0.88){ addGold+=avg*3; jack++; } // 잭팟
    else if(r<0.97) addGem+=1+Math.floor(Math.random()*2); // 정수
    else buff=Math.max(buff,12);            // 광폭화 버프
  }
  addGold=Math.ceil(addGold);
  if(addGold>0)S.gold+=addGold;
  if(addGem>0)S.gems+=addGem;
  if(buff>0){ skillState.berserk.buff=Math.max(skillState.berserk.buff,buff); updateSkills(); }
  let msg=(n>1?('×'+n+' '):'')+'💰 +'+fmt(addGold);
  if(addGem>0)msg+='  💎 +'+addGem;
  if(jack>0)msg+='  🎉×'+jack;
  if(buff>0)msg+='  ⚡';
  lastGacha.gold=msg; floatNum('🎰 '+msg,true,'#ffce54');
  updateTop();renderShop();flashSave();
}
const GEM_GACHA_COST=3;
function gemGachaInfo(){ return resolveQty(GEM_GACHA_COST,1,0,S.gems); }
function spinGemGacha(){
  const {n,sum}=gemGachaInfo(); if(n<1||S.gems<sum)return;
  S.gems-=sum;
  let addGold=0,addGem=0,relicN=0,equipN=0,jack=0; let lastRelic=null;
  for(let i=0;i<n;i++){
    const r=Math.random();
    if(r<0.30) addGold+=pureGold(Math.max(1,S.maxStage))*goldMult()*800;
    else if(r<0.55) addGem+=2;
    else if(r<0.75){
      const rc=RELICS[Math.floor(Math.random()*RELICS.length)];
      if(!S.relics)S.relics={}; S.relics[rc.id]=(S.relics[rc.id]||0)+1;
      relicN++; lastRelic={ico:rc.ico,nm:rc.nm,lv:S.relics[rc.id]};
    }
    else if(r<0.92){
      const owned=EQUIP_SLOTS.filter(s=>S.equip&&S.equip[s.id]&&S.equip[s.id].lv>0);
      if(owned.length){ const sl=owned[Math.floor(Math.random()*owned.length)]; S.equip[sl.id].lv+=2; equipN++; }
      else addGem+=2;
    }
    else { addGem+=5; jack++; }
  }
  addGold=Math.ceil(addGold);
  if(addGold>0)S.gold+=addGold;
  if(addGem>0)S.gems+=addGem;
  const parts=[];
  if(addGold>0)parts.push('💰 +'+fmt(addGold));
  if(addGem>0)parts.push('💎 +'+addGem);
  if(relicN>0)parts.push('📜 ×'+relicN);
  if(equipN>0)parts.push('🔨 +'+(equipN*2));
  if(jack>0)parts.push('🎉×'+jack);
  const msg=(n>1?('×'+n+' '):'')+(parts.join('  ')||'꽝');
  if(relicN===1&&n===1&&lastRelic)floatNum(lastRelic.ico+' '+lastRelic.nm+' Lv.'+lastRelic.lv+'!',true,'#ffd86b');
  lastGacha.gem=msg; floatNum('🎁 '+msg,true,'#7ee0ff');
  updateTop();renderShop();flashSave();
}

// ── 연구소 ──
function researchStatus(id){
  if(S.research&&S.research.done&&S.research.done[id])return 'done';
  const a=S.research&&S.research.active;
  if(a&&a.id===id)return Date.now()>=a.end?'ready':'running';
  return 'idle';
}
function startResearch(r){
  if(!S.research)S.research={active:null,done:{}};
  if(S.research.active)return;                  // 한 번에 하나만
  if(researchStatus(r.id)!=='idle')return;
  if(S.gems<r.cost)return;
  S.gems-=r.cost; S.research.active={id:r.id,end:Date.now()+r.dur*1000};
  floatNum('🔬 '+r.nm+' 연구 시작!',true,'#7ee0ff');
  updateTop();renderShop();flashSave();
}
function claimResearch(r){
  if(researchStatus(r.id)!=='ready')return;
  if(!S.research.done)S.research.done={}; S.research.done[r.id]=true;
  S.research.active=null;
  floatNum('🔬 '+r.nm+' 완료! '+r.desc,true,'#5ad17a');
  updateTop();renderShop();flashSave();
}
function researchReadyCount(){
  const a=S.research&&S.research.active;
  return (a&&Date.now()>=a.end)?1:0;
}
function updateResearchBadge(){
  const t=document.querySelector('.tab[data-tab="research"]'); if(!t)return;
  const n=researchReadyCount();
  t.innerHTML='🔬 연구'+(n>0?' <span style="color:#7ee0ff">('+n+')</span>':'');
}

function card(o){
  const el=document.createElement('div');
  el.className='card '+(o.locked?'locked':((o.costCls&&o.costCls.indexOf('ok')>=0)?'afford':''));
  el.innerHTML=`<div class="ico">${o.ico}</div>
    <div class="info"><div class="nm">${o.nm}</div><div class="sub">${o.sub}</div><div class="lvl">${o.lvl}</div></div>
    <div class="cost ${o.costCls||''}">${o.cost}</div>`;
  el.onclick=o.onclick;
  return el;
}

$('lockBtn').onclick=()=>{ S.autoProgress=!S.autoProgress;
  if(S.autoProgress){S.stage=S.frontier;S.killsThisStage=0;spawnMob();} updateStageLabel(); };

// ── 환생 ──
$('prestigeBtn').onclick=()=>{
  const g=gemsFromPrestige();
  if(g<=0){ openModal('아직 일러요','최고 <b>스테이지 '+prestigeReqStage()+'</b>에 도달하면 환생할 수 있어요.<br>지금 최고 스테이지: '+S.maxStage,[{t:'확인',cls:'',fn:closeModal}]); return; }
  openModal('💀 환생하시겠습니까?',
    `정수 <span class="big">💎 ${g}</span> 를 얻고,<br>골드·동료·강화가 초기화됩니다.<br>정수 상점의 영구 강화는 유지됩니다.`,
    [{t:'취소',cls:'',fn:closeModal},{t:'환생!',cls:'ready',fn:()=>{doPrestige(g);closeModal();}}]);
};
function doPrestige(g){
  // 영구 보존: 정수/정수강화(깊은 복사)/환생횟수/도전과제/최고기록/누적처치
  const keepGem=Object.assign({gALL:0,gGold:0,gStart:0},S.gem||{});
  const keep={ gems:(S.gems||0)+g, gem:keepGem, prestiges:(S.prestiges||0)+1,
    achClaimed:S.achClaimed||{}, bestStage:S.bestStage||S.maxStage||1, totalKills:S.totalKills||0,
    relics:S.relics||{},                       // 유물은 영구 보존(환생해도 유지)
    equip:S.equip||{},                          // 대장간 장비도 영구 보존
    research:S.research||{active:null,done:{}}, // 연구 결과(영구) 보존
    exped:S.exped||{}, expedDone:S.expedDone||0, lastDaily:S.lastDaily||0 };
  const startBonus=3*(keepGem.gStart||0);
  S=defaultState();
  Object.assign(S,keep);
  S.stage=S.maxStage=S.frontier=1+startBonus;
  spawnMob();updateTop();updateStageLabel();renderShop();save();
  floatNum('환생 완료!',false,'#b46bff');
}

// ── 모달 ──
function openModal(title,body,btns){
  $('mTitle').innerHTML=title; $('mBody').innerHTML=body;
  const bb=$('modalBtns'); bb.innerHTML='';
  btns.forEach(b=>{const x=document.createElement('button');x.className='btn '+(b.cls||'');
    x.textContent=b.t;x.onclick=b.fn;bb.appendChild(x);});
  $('modalBg').classList.add('show');
}
function closeModal(){$('modalBg').classList.remove('show');}

// ── 저장 / 불러오기 ──
let saveFlash=0;
function save(){ S.lastSeen=Date.now(); try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){} }
function flashSave(){save();$('saveStat').textContent='💾 저장됨';saveFlash=Date.now();}
setInterval(()=>{save(); if(Date.now()-saveFlash>1500)$('saveStat').textContent='💾 자동 저장 중 · 최고 스테이지 '+S.maxStage;},3000);
window.addEventListener('beforeunload',save);

function load(){
  let raw=null; try{raw=localStorage.getItem(SAVE_KEY);}catch(e){}
  if(raw){
    try{ const d=JSON.parse(raw); S=Object.assign(defaultState(),d);
      S.upg=Object.assign({click:0,dmg:0,gold:0,crit:0,critDmg:0,auto:0,offline:0},d.upg||{});
      S.gem=Object.assign({gALL:0,gGold:0,gStart:0,gCrit:0,gAuto:0,gOffline:0,gSkill:0},d.gem||{});
      S.relics=d.relics||{};
      S.equip=d.equip||{};
      S.research=(d.research&&typeof d.research==='object')
        ? {active:d.research.active||null, done:d.research.done||{}}
        : {active:null,done:{}};
      S.heroes=d.heroes||{};
      S.achClaimed=d.achClaimed||{};
      S.bossCleared=d.bossCleared||{};
      S.exped=d.exped||{}; S.expedDone=d.expedDone||0;
      S.lastDaily=d.lastDaily||0;
      S.rouletteSpins=d.rouletteSpins||0;
      S.prestiges=d.prestiges||0;
      S.bestStage=Math.max(d.bestStage||1,d.maxStage||1,d.stage||1);
    }catch(e){ S=defaultState(); }
  }else S=defaultState();
  S.frontier=Math.max(S.frontier||1,S.maxStage||1,S.stage||1);
  S.bestStage=Math.max(S.bestStage||1,S.maxStage||1);
}

// ── 오프라인 보상 + 일일 출석 보상 ──
function dayKey(){ const n=new Date(); return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate(); }
function welcomeBack(){
  const lines=[];
  // 1) 오프라인 골드(최대 8시간)
  const dt=Math.min((Date.now()-(S.lastSeen||Date.now()))/1000, OFFLINE_CAP_H*3600);
  const d=totalDps();
  if(dt>=60 && d>0){
    const gph=goldReward(S.stage,false)/mobMaxHp(S.stage,false);
    const earn=Math.floor(d*dt*gph*offlineEff()); // 효율(기본 60% + 강화/정수/유물)
    if(earn>0){ S.gold+=earn;
      lines.push(`자리를 비운 ${fmtTime(dt)} 동안<br>동료들이 골드 <span class="big">💰 ${fmt(earn)}</span> 를 벌었어요!`); }
  }
  // 2) 일일 출석 보상(하루 한 번)
  const today=dayKey();
  if(S.lastDaily!==today){
    S.lastDaily=today;
    const gems=3+Math.floor((S.bestStage||1)/20);
    S.gems+=gems;
    lines.push(`📅 오늘의 <b>출석 보상</b>: 정수 <span class="big">💎 ${gems}</span> 획득!`);
  }
  if(lines.length){
    openModal('🌙 다시 오셨군요!', lines.join('<br><br>'), [{t:'받기',cls:'ready',fn:closeModal}]);
    updateTop(); save();
  }
}

// ── 초기화 ──
load();
spawnMob();
renderSkills();
updateTop(); updateStageLabel(); renderShop();
welcomeBack();
$('saveStat').textContent='💾 자동 저장 중 · 최고 스테이지 '+S.maxStage;
setInterval(updateTop,250);
</script>
