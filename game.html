<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚔️ 방치의 던전 — IDLE DUNGEON</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0c0e16; --panel:#161a28; --panel2:#1d2236; --line:#2c3350;
    --gold:#ffce54; --gem:#7ee0ff; --dps:#ff7b6b; --click:#9b8cff;
    --txt:#e8ecf5; --dim:#8b93ad; --good:#5ad17a; --bad:#ff5a78;
  }
  html,body{height:100%}
  body{
    background:radial-gradient(circle at 50% -10%,#1a2140,#0c0e16 60%);
    color:var(--txt);font-family:'Segoe UI','Malgun Gothic',sans-serif;
    overflow:hidden;user-select:none;
  }
  #app{display:flex;flex-direction:column;height:100vh;max-width:1100px;margin:0 auto}

  /* ── 상단 자원 바 ── */
  #topbar{display:flex;gap:8px;padding:10px;flex-wrap:wrap;justify-content:center;
    background:linear-gradient(#11141f,#0c0e16);border-bottom:1px solid var(--line)}
  .res{flex:1;min-width:120px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;align-items:center}
  .res .v{font-size:18px;font-weight:700;line-height:1.1}
  .res .k{font-size:10px;letter-spacing:1px;color:var(--dim);margin-top:2px}
  .res.gold .v{color:var(--gold)} .res.gem .v{color:var(--gem)}
  .res.dps .v{color:var(--dps)} .res.click .v{color:var(--click)}

  /* ── 본문 ── */
  #main{flex:1;display:flex;gap:10px;padding:10px;min-height:0}
  #combat{flex:1.1;display:flex;flex-direction:column;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:14px;position:relative;overflow:hidden}
  #shop{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    display:flex;flex-direction:column;min-width:0}

  /* 스테이지 헤더 */
  #stageHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  #stageNav{display:flex;align-items:center;gap:6px}
  .navbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;width:30px;height:28px;font-size:15px;cursor:pointer}
  .navbtn:active{transform:scale(.92)}
  #stageLabel{font-size:15px;font-weight:700}
  #lockBtn{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--dim);cursor:pointer}
  #lockBtn.on{color:#0c0e16;background:var(--gold);border-color:var(--gold);font-weight:700}

  /* 몬스터 무대 */
  #stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;cursor:pointer;min-height:200px}
  #mob{font-size:120px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.6));
    transition:transform .05s;line-height:1}
  #mob.hit{transform:scale(.9) rotate(-4deg)}
  #mobName{margin-top:6px;font-size:13px;color:var(--dim);letter-spacing:1px}
  #bossTimer{font-size:14px;font-weight:700;color:var(--bad);height:18px;margin-top:2px}
  /* HP 바 */
  #hpWrap{width:90%;max-width:380px;height:24px;background:#0a0c14;border:1px solid var(--line);
    border-radius:20px;overflow:hidden;margin-top:14px;position:relative}
  #hpBar{height:100%;width:100%;background:linear-gradient(90deg,#ff6a5a,#ff3b6b);
    transition:width .08s linear}
  #hpTxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;text-shadow:0 1px 3px #000}
  #killCount{font-size:11px;color:var(--dim);margin-top:8px;height:14px}

  /* 떠오르는 데미지 숫자 */
  .float{position:absolute;font-weight:800;pointer-events:none;animation:floatUp .9s ease-out forwards;
    text-shadow:0 2px 4px #000;font-size:20px;z-index:5}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.8)}
    20%{transform:translateY(-10px) scale(1.15)}100%{opacity:0;transform:translateY(-70px) scale(1)}}

  /* ── 상점 ── */
  #shopTabs{display:flex;border-bottom:1px solid var(--line)}
  .tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;color:var(--dim);
    cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--txt);border-bottom-color:var(--gold)}
  #shopList{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  #shopList::-webkit-scrollbar{width:8px}
  #shopList::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.1s}
  .card:active{transform:scale(.99)}
  .card.afford{border-color:#3a4a6e}
  .card.afford:hover{border-color:var(--gold)}
  .card.locked{opacity:.45;cursor:not-allowed}
  .card .ico{font-size:30px;width:42px;text-align:center;flex:none}
  .card .info{flex:1;min-width:0}
  .card .nm{font-size:14px;font-weight:700}
  .card .sub{font-size:11px;color:var(--dim);margin-top:2px}
  .card .lvl{font-size:11px;color:var(--gem);margin-top:2px}
  .card .cost{font-size:13px;font-weight:700;text-align:right;flex:none;white-space:nowrap}
  .card .cost.ok{color:var(--gold)} .card .cost.no{color:var(--bad)}
  .card .cost.gem.ok{color:var(--gem)}

  /* ── 하단 ── */
  #footer{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line);align-items:center}
  #saveStat{font-size:11px;color:var(--dim);flex:1}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:9px 14px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer}
  .btn:active{transform:scale(.96)}
  #prestigeBtn{border-color:#5b4bb0;color:#c9bcff}
  #prestigeBtn.ready{background:linear-gradient(90deg,#7a5cff,#b46bff);color:#fff;border:none;
    box-shadow:0 0 16px rgba(140,90,255,.5);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{box-shadow:0 0 26px rgba(140,90,255,.85)}}

  /* ── 모달 ── */
  #modalBg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;
    justify-content:center;z-index:50;padding:20px}
  #modalBg.show{display:flex}
  #modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:24px;max-width:380px;width:100%;text-align:center}
  #modal h2{font-size:20px;margin-bottom:10px}
  #modal p{color:var(--dim);font-size:13px;line-height:1.6;margin-bottom:18px}
  #modal .big{font-size:22px;font-weight:800;color:var(--gold)}
  #modalBtns{display:flex;gap:10px}
  #modalBtns .btn{flex:1;padding:12px}

  @media(max-width:680px){
    #main{flex-direction:column;overflow-y:auto}
    #mob{font-size:90px}
    .res{min-width:46%}
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="res gold"><div class="v" id="rGold">0</div><div class="k">💰 골드</div></div>
    <div class="res dps"><div class="v" id="rDps">0</div><div class="k">⚔️ 초당 피해</div></div>
    <div class="res click"><div class="v" id="rClick">1</div><div class="k">👆 클릭 피해</div></div>
    <div class="res gem"><div class="v" id="rGem">0</div><div class="k">💎 정수</div></div>
  </div>

  <div id="main">
    <!-- 전투 -->
    <div id="combat">
      <div id="stageHead">
        <div id="stageNav">
          <button class="navbtn" id="navPrev">◀</button>
          <div id="stageLabel">스테이지 1</div>
          <button class="navbtn" id="navNext">▶</button>
        </div>
        <button id="lockBtn">🔓 자동진행</button>
      </div>
      <div id="stage">
        <div id="bossTimer"></div>
        <div id="mob">👾</div>
        <div id="mobName">슬라임</div>
        <div id="hpWrap"><div id="hpBar"></div><div id="hpTxt"></div></div>
        <div id="killCount"></div>
      </div>
    </div>

    <!-- 상점 -->
    <div id="shop">
      <div id="shopTabs">
        <div class="tab active" data-tab="hero">🛡️ 동료</div>
        <div class="tab" data-tab="up">⬆️ 강화</div>
        <div class="tab" data-tab="gem">💎 정수상점</div>
      </div>
      <div id="shopList"></div>
    </div>
  </div>

  <div id="footer">
    <div id="saveStat">불러오는 중…</div>
    <button class="btn" id="buyMaxBtn">구매: x1</button>
    <button class="btn" id="prestigeBtn">💀 환생</button>
  </div>
</div>

<div id="modalBg"><div id="modal">
  <h2 id="mTitle"></h2><p id="mBody"></p>
  <div id="modalBtns"></div>
</div></div>

<script>
"use strict";
// ════════════════════════════════════════════
//  방치의 던전 — 간단한 방치형(Idle) 게임
// ════════════════════════════════════════════
const SAVE_KEY='idleDungeonSave_v1';
const OFFLINE_CAP_H=8;            // 오프라인 보상 최대 8시간
const $=id=>document.getElementById(id);

// ── 동료(영웅): 자동 DPS 제공 ──
const HEROES=[
  {id:'novice', nm:'견습 전사', ico:'🗡️', dps:1,     cost:15},
  {id:'archer', nm:'궁수',      ico:'🏹', dps:8,     cost:120},
  {id:'mage',   nm:'마법사',    ico:'🪄', dps:47,    cost:1300},
  {id:'rogue',  nm:'도적',      ico:'🗝️', dps:260,   cost:14000},
  {id:'knight', nm:'기사',      ico:'🛡️', dps:1400,  cost:160000},
  {id:'cleric', nm:'성기사',    ico:'⚜️', dps:7800,  cost:1.8e6},
  {id:'archmage',nm:'대마법사', ico:'🔮', dps:44000, cost:2.2e7},
  {id:'dragoon',nm:'용기사',    ico:'🐲', dps:260000,cost:3.5e8},
  {id:'titan',  nm:'거신 병사', ico:'🗿', dps:1.6e6, cost:5e9},
  {id:'angel',  nm:'대천사',    ico:'😇', dps:9.5e6, cost:7e10},
];
// ── 강화(골드) ──
const UPGRADES=[
  {id:'click', nm:'검 강화',   ico:'👆', sub:'클릭 피해 +60%',      baseCost:25,  mult:1.6},
  {id:'dmg',   nm:'동료 훈련', ico:'⚔️', sub:'모든 동료 DPS +25%',  baseCost:400, mult:1.9},
  {id:'gold',  nm:'황금 손길', ico:'💰', sub:'골드 획득 +20%',      baseCost:300, mult:1.8},
];
// ── 정수(환생) 상점: 영구 강화 ──
const GEMSHOP=[
  {id:'gAll',  nm:'영웅의 유산', ico:'🌟', sub:'모든 피해 +15% / 레벨',         baseCost:1, mult:1.6, key:'gALL'},
  {id:'gGold', nm:'탐욕의 인장', ico:'🪙', sub:'골드 획득 +25% / 레벨',         baseCost:1, mult:1.7, key:'gGold'},
  {id:'gStart',nm:'개척자',      ico:'🚩', sub:'환생 후 시작 스테이지 +2 / 레벨', baseCost:3, mult:2.2, key:'gStart'},
];

const MOBS=['👾','🦂','🕷️','🐍','🦇','🐗','👹','👺','🧟','🦅','🪰','🐙','🦴','👻'];
const MOB_NAMES=['슬라임','전갈','거미','독사','박쥐','멧돼지','오우거','고블린','좀비','하피','독충','심해수','해골','원혼'];
const BOSSES=['🐉','👿','💀','🦖','👹','🐲','🦑','☠️'];
const BOSS_NAMES=['고룡','마왕','리치','폭군룡','파괴왕','심연룡','크라켄','죽음의 군주'];

let S; // 게임 상태
function defaultState(){
  return {
    gold:0, gems:0, stage:1, maxStage:1, frontier:1,
    heroes:{}, upg:{click:0,dmg:0,gold:0}, gem:{gALL:0,gGold:0,gStart:0},
    autoProgress:true, killsThisStage:0, lastSeen:Date.now(),
    totalKills:0,
  };
}

// ── 숫자 포맷 ──
const SUF=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','Ud','Dd'];
function fmt(n){
  if(n<1000)return (Math.floor(n*10)/10).toString().replace(/\.0$/,'');
  let t=0; while(n>=1000&&t<SUF.length-1){n/=1000;t++;}
  return n.toFixed(n<10?2:n<100?1:0)+SUF[t];
}
function fmtTime(s){
  s=Math.floor(s); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;
  if(h>0)return `${h}시간 ${m}분`; if(m>0)return `${m}분 ${x}초`; return `${x}초`;
}

// ── 파생 수치 ──
function clickPower(){
  return Math.ceil(1*Math.pow(1.6,S.upg.click))*gemAllMult();
}
function totalDps(){
  let d=0;
  for(const h of HEROES) d+=(S.heroes[h.id]||0)*h.dps;
  d*=Math.pow(1.25,S.upg.dmg);   // 동료 훈련
  d*=gemAllMult();
  return d;
}
function goldMult(){ return Math.pow(1.20,S.upg.gold)*Math.pow(1.25,S.gem.gGold||0); }
function gemAllMult(){ return 1+0.15*(S.gem.gALL||0); }

function mobMaxHp(stage,boss){
  let hp=10*Math.pow(1.55,stage-1);
  if(boss)hp*=14;
  return Math.ceil(hp);
}
function goldReward(stage,boss){
  let g=6*Math.pow(1.17,stage-1);
  if(boss)g*=12;
  return Math.ceil(g*goldMult());
}
function isBossStage(st){return st%10===0;}
function killsNeeded(st){return isBossStage(st)?1:4;} // 일반 스테이지는 4킬마다 전진

// ── 환생(프레스티지) 보상 ──
function gemsFromPrestige(){
  if(S.maxStage<25)return 0;
  return Math.floor(Math.pow(S.maxStage/22,1.45));
}

// ── 몬스터 스폰 ──
let mob={hp:0,max:0,boss:false,timer:0};
function spawnMob(){
  const st=S.stage, boss=isBossStage(st);
  mob.boss=boss; mob.max=mobMaxHp(st,boss); mob.hp=mob.max;
  mob.timer=boss?30:0;
  const idx=(st-1);
  if(boss){
    $('mob').textContent=BOSSES[(st/10-1)%BOSSES.length];
    $('mobName').textContent='👑 '+BOSS_NAMES[(st/10-1)%BOSS_NAMES.length];
  }else{
    $('mob').textContent=MOBS[idx%MOBS.length];
    $('mobName').textContent=MOB_NAMES[idx%MOB_NAMES.length];
  }
  renderHp();
}
function renderHp(){
  const pct=Math.max(0,mob.hp/mob.max*100);
  $('hpBar').style.width=pct+'%';
  $('hpTxt').textContent=fmt(Math.max(0,mob.hp))+' / '+fmt(mob.max);
  $('bossTimer').textContent=mob.boss?('⏳ '+Math.max(0,mob.timer).toFixed(1)+'초'):'';
  const need=killsNeeded(S.stage);
  $('killCount').textContent=mob.boss?'보스를 처치하라!':`이 스테이지 처치 ${S.killsThisStage}/${need}`;
}

// ── 데미지 적용 / 처치 ──
function dealDamage(amt,fromClick){
  if(mob.hp<=0)return;
  mob.hp-=amt;
  if(fromClick)floatNum(amt,true);
  if(mob.hp<=0)onKill();
  else renderHp();
}
function onKill(){
  const boss=mob.boss;
  S.gold+=goldReward(S.stage,boss);
  S.totalKills++; S.killsThisStage++;
  const need=killsNeeded(S.stage);
  let advanced=false;
  if(S.killsThisStage>=need){
    S.killsThisStage=0;
    if(S.autoProgress){
      S.stage++; advanced=true;
      S.maxStage=Math.max(S.maxStage,S.stage);
      S.frontier=Math.max(S.frontier,S.stage);
    }
  }
  if(advanced)floatNum('스테이지 '+S.stage+'!',false,'#ffce54');
  spawnMob();
  updateTop(); updateStageLabel();
}

// ── 떠오르는 숫자 ──
function floatNum(v,crit,color){
  const el=document.createElement('div');
  el.className='float';
  el.textContent=typeof v==='number'?('-'+fmt(v)):v;
  el.style.color=color||(crit?'#fff':'#ffd86b');
  const stg=$('stage');const r=stg.getBoundingClientRect();
  el.style.left=(r.width*0.5+(Math.random()-0.5)*r.width*0.4)+'px';
  el.style.top=(r.height*0.4+(Math.random()-0.5)*40)+'px';
  if(crit)el.style.fontSize='26px';
  stg.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ── 클릭 공격 ──
$('stage').addEventListener('pointerdown',()=>{
  dealDamage(clickPower(),true);
  const m=$('mob');m.classList.add('hit');setTimeout(()=>m.classList.remove('hit'),60);
});

// ── 메인 루프 ──
let lastTick=Date.now();
function tick(){
  const now=Date.now(); let dt=(now-lastTick)/1000; lastTick=now;
  if(dt>1)dt=1;
  if(mob.boss&&mob.hp>0){
    mob.timer-=dt;
    if(mob.timer<=0){ floatNum('보스 도주!',false,'#ff5a78'); S.killsThisStage=0; spawnMob(); }
  }
  const d=totalDps();
  if(d>0&&mob.hp>0)dealDamage(d*dt,false);
  renderHp();
}
setInterval(tick,100);

// ── 구매 수량 모드 ──
let buyMode=1;
const BUY_MODES=[1,10,100,'max'];
$('buyMaxBtn').onclick=()=>{
  buyMode=BUY_MODES[(BUY_MODES.indexOf(buyMode)+1)%BUY_MODES.length];
  $('buyMaxBtn').textContent='구매: '+(buyMode==='max'?'MAX':'x'+buyMode);
  renderShop();
};
function costFor(base,mult,have,qty){
  let c=0,b=base*Math.pow(mult,have);
  for(let i=0;i<qty;i++){c+=b;b*=mult;}
  return c;
}
function maxAfford(base,mult,have,gold){
  let n=0,b=base*Math.pow(mult,have),sum=0;
  while(sum+b<=gold&&n<100000){sum+=b;b*=mult;n++;}
  return {n,sum};
}
function resolveQty(base,mult,have,currency){
  if(buyMode!=='max')return {n:buyMode,sum:costFor(base,mult,have,buyMode)};
  const r=maxAfford(base,mult,have,currency);
  return r.n<1?{n:1,sum:costFor(base,mult,have,1)}:r;
}

// ── 상점 렌더 ──
let activeTab='hero';
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  activeTab=t.dataset.tab;
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  $('buyMaxBtn').style.display=activeTab==='gem'?'none':'';
  renderShop();
});
function renderShop(){
  const list=$('shopList'); list.innerHTML='';
  if(activeTab==='hero'){
    HEROES.forEach((h,i)=>{
      const have=S.heroes[h.id]||0;
      const locked=i>0 && (S.heroes[HEROES[i-1].id]||0)<1 && have===0;
      const {n,sum}=resolveQty(h.cost,1.15,have,S.gold);
      const ok=!locked&&S.gold>=sum;
      const addDps=h.dps*n*Math.pow(1.25,S.upg.dmg)*gemAllMult();
      list.appendChild(card({
        ico:h.ico, nm:h.nm, sub:`개당 ${fmt(h.dps)} DPS`,
        lvl:locked?'🔒 이전 동료 필요':`보유 ${have}  ·  구매 시 +${fmt(addDps)} DPS`,
        cost:locked?'🔒':'💰 '+fmt(sum), costCls:ok?'ok':'no', locked,
        onclick:()=>{ if(locked||S.gold<sum)return; S.gold-=sum; S.heroes[h.id]=have+n; updateTop();renderShop();flashSave(); }
      }));
    });
  }else if(activeTab==='up'){
    UPGRADES.forEach(u=>{
      const have=S.upg[u.id]||0;
      const {n,sum}=resolveQty(u.baseCost,u.mult,have,S.gold);
      const ok=S.gold>=sum;
      list.appendChild(card({
        ico:u.ico, nm:u.nm, sub:u.sub, lvl:`레벨 ${have}`,
        cost:'💰 '+fmt(sum), costCls:ok?'ok':'no',
        onclick:()=>{ if(S.gold<sum)return; S.gold-=sum; S.upg[u.id]=have+n; updateTop();renderShop();flashSave(); }
      }));
    });
  }else{ // gem
    GEMSHOP.forEach(g=>{
      const have=S.gem[g.key]||0;
      const cost=Math.ceil(g.baseCost*Math.pow(g.mult,have));
      const ok=S.gems>=cost;
      list.appendChild(card({
        ico:g.ico, nm:g.nm, sub:g.sub, lvl:`레벨 ${have}`,
        cost:'💎 '+fmt(cost), costCls:'gem '+(ok?'ok':'no'),
        onclick:()=>{ if(S.gems<cost)return; S.gems-=cost; S.gem[g.key]=have+1; updateTop();renderShop();flashSave(); }
      }));
    });
    const info=document.createElement('div');
    info.style.cssText='font-size:11px;color:var(--dim);text-align:center;padding:8px;line-height:1.6';
    info.innerHTML=`💎 정수는 <b>환생</b>으로 획득합니다.<br>현재 환생 시 <b style="color:var(--gem)">${gemsFromPrestige()}</b>개 획득 (최고 스테이지 ${S.maxStage} 기준)`;
    list.appendChild(info);
  }
}
function card(o){
  const el=document.createElement('div');
  el.className='card '+(o.locked?'locked':((o.costCls&&o.costCls.indexOf('ok')>=0)?'afford':''));
  el.innerHTML=`<div class="ico">${o.ico}</div>
    <div class="info"><div class="nm">${o.nm}</div><div class="sub">${o.sub}</div><div class="lvl">${o.lvl}</div></div>
    <div class="cost ${o.costCls||''}">${o.cost}</div>`;
  el.onclick=o.onclick;
  return el;
}

// ── 상단/스테이지 표시 ──
function updateTop(){
  $('rGold').textContent=fmt(S.gold);
  $('rGem').textContent=fmt(S.gems);
  $('rDps').textContent=fmt(totalDps());
  $('rClick').textContent=fmt(clickPower());
  $('prestigeBtn').classList.toggle('ready',gemsFromPrestige()>0);
}
function updateStageLabel(){
  $('stageLabel').textContent='스테이지 '+S.stage+(isBossStage(S.stage)?' 👑':'');
  $('lockBtn').classList.toggle('on',!S.autoProgress);
  $('lockBtn').textContent=S.autoProgress?'🔓 자동진행':'🔒 고정사냥';
}

// ── 스테이지 네비 / 고정 ──
$('navPrev').onclick=()=>{ if(S.stage>1){S.stage--;S.autoProgress=false;S.killsThisStage=0;spawnMob();updateStageLabel();} };
$('navNext').onclick=()=>{
  if(S.stage<S.frontier){S.stage++;S.killsThisStage=0;spawnMob();
    if(S.stage>=S.frontier)S.autoProgress=true; updateStageLabel();}
  else { S.autoProgress=true; updateStageLabel(); }
};
$('lockBtn').onclick=()=>{ S.autoProgress=!S.autoProgress;
  if(S.autoProgress){S.stage=S.frontier;S.killsThisStage=0;spawnMob();} updateStageLabel(); };

// ── 환생 ──
$('prestigeBtn').onclick=()=>{
  const g=gemsFromPrestige();
  if(g<=0){ openModal('아직 일러요','최고 <b>스테이지 25</b>에 도달하면 환생할 수 있어요.<br>지금 최고 스테이지: '+S.maxStage,[{t:'확인',cls:'',fn:closeModal}]); return; }
  openModal('💀 환생하시겠습니까?',
    `정수 <span class="big">💎 ${g}</span> 를 얻고,<br>골드·동료·강화가 초기화됩니다.<br>정수 상점의 영구 강화는 유지됩니다.`,
    [{t:'취소',cls:'',fn:closeModal},{t:'환생!',cls:'ready',fn:()=>{doPrestige(g);closeModal();}}]);
};
function doPrestige(g){
  const keepGems=S.gems+g, gemUp=S.gem;
  const startBonus=2*(S.gem.gStart||0);
  S=defaultState();
  S.gems=keepGems; S.gem=gemUp;
  S.stage=S.maxStage=S.frontier=1+startBonus;
  spawnMob();updateTop();updateStageLabel();renderShop();save();
  floatNum('환생 완료!',false,'#b46bff');
}

// ── 모달 ──
function openModal(title,body,btns){
  $('mTitle').innerHTML=title; $('mBody').innerHTML=body;
  const bb=$('modalBtns'); bb.innerHTML='';
  btns.forEach(b=>{const x=document.createElement('button');x.className='btn '+(b.cls||'');
    x.textContent=b.t;x.onclick=b.fn;bb.appendChild(x);});
  $('modalBg').classList.add('show');
}
function closeModal(){$('modalBg').classList.remove('show');}

// ── 저장 / 불러오기 ──
let saveFlash=0;
function save(){ S.lastSeen=Date.now(); try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){} }
function flashSave(){save();$('saveStat').textContent='💾 저장됨';saveFlash=Date.now();}
setInterval(()=>{save(); if(Date.now()-saveFlash>1500)$('saveStat').textContent='💾 자동 저장 중 · 최고 스테이지 '+S.maxStage;},3000);
window.addEventListener('beforeunload',save);

function load(){
  let raw=null; try{raw=localStorage.getItem(SAVE_KEY);}catch(e){}
  if(raw){
    try{ const d=JSON.parse(raw); S=Object.assign(defaultState(),d);
      S.upg=Object.assign({click:0,dmg:0,gold:0},d.upg||{});
      S.gem=Object.assign({gALL:0,gGold:0,gStart:0},d.gem||{});
      S.heroes=d.heroes||{};
    }catch(e){ S=defaultState(); }
  }else S=defaultState();
  S.frontier=Math.max(S.frontier||1,S.maxStage||1,S.stage||1);
}

// ── 오프라인 보상 ──
function offlineReward(){
  const dt=Math.min((Date.now()-(S.lastSeen||Date.now()))/1000, OFFLINE_CAP_H*3600);
  if(dt<60)return; // 1분 미만은 무시
  const d=totalDps(); if(d<=0)return;
  const gph=goldReward(S.stage,false)/mobMaxHp(S.stage,false);
  const earn=Math.floor(d*dt*gph*0.6); // 60% 효율
  if(earn<=0)return;
  S.gold+=earn;
  openModal('🌙 다시 오셨군요!',
    `자리를 비운 ${fmtTime(dt)} 동안<br>동료들이 골드 <span class="big">💰 ${fmt(earn)}</span> 를 벌었어요!`,
    [{t:'받기',cls:'ready',fn:closeModal}]);
}

// ── 초기화 ──
load();
spawnMob();
updateTop(); updateStageLabel(); renderShop();
offlineReward();
$('saveStat').textContent='💾 자동 저장 중 · 최고 스테이지 '+S.maxStage;
setInterval(updateTop,250);
</script>
</body>
</html>
